name: Deploy Dragon Warriors Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Build Started
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🏗️ *Dragon Warriors Frontend* — Build Started
            *Commit:* ${{ github.sha }}
            *Branch:* ${{ github.ref_name }}
            *Author:* ${{ github.actor }}
            *Message:* ${{ github.event.head_commit.message }}

      - name: Deploy to Dokku
        id: deploy
        continue-on-error: true
        uses: dokku/github-action@master
        with:
          git_remote_url: ssh://dokku@${{ secrets.DOKKU_HOST }}:22/dragon-warriors-frontend
          ssh_private_key: ${{ secrets.DOKKU_SSH_KEY }}
          git_push_flags: --force

      - name: Notify Build Success
        if: steps.deploy.outcome == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ *Dragon Warriors Frontend* — Deploy Succeeded
            *Commit:* ${{ github.sha }}
            *Message:* ${{ github.event.head_commit.message }}
            *By:* ${{ github.actor }}

      - name: Notify Build Failed
        if: steps.deploy.outcome != 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ *Dragon Warriors Frontend* — Deploy Failed
            *Commit:* ${{ github.sha }}
            *Message:* ${{ github.event.head_commit.message }}
            *By:* ${{ github.actor }}
            *Error:* ${{ steps.deploy.outcome }}
            
            🔍 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
